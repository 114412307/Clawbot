services:
  - type: web
    name: openclaw
    runtime: docker
    repo: https://github.com/openclaw/openclaw.git
    branch: main
    plan: starter
    healthCheckPath: /health
    dockerCommand: node openclaw.mjs gateway --allow-unconfigured --port 8080 --bind lan
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
